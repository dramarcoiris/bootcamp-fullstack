<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pseudo clases</title>
</head>
<body>
    <header>
        <h1>Practicando pseudoclases</h1>
        <nav>
            <a href="#enlace1">Enlace principal</a>
            <a href="#enlace2">Enlace secundario</a>
        </nav>
    </header>
    <main>
        <button>Soy un botón</button>
        <button>Soy un botón al lado de otro botón</button>
        <ol>
            <li>Elemento de</li>
            <li>Elemento de l</li>
            <li>Elemento de li</li>
            <li>Elemento de lis</li>
            <li>Elemento de lista</li>
        </ol>
        <form>
            <label for="name">Nombre y apellidos</label>
            <input for="name" id="name" type="text"><br>
            <label for="num-cuenta">Número de cuenta</label>
            <input for="num-cuenta" id="num-cuenta" type="number" minlength="12"><br>
            <label for="secret-number">Número secreto de tu tarjeta de crédito</label>
            <input for="secret-number" id="secret-number" type="number" maxlength="3" disabled><br>
            <input for="checkbox" id="checkbox" type="checkbox">
            <label for="checkbox">Acepto las condiciones</label><br>
            <button>Compartir mis datos bancarios</button>
        </form>
    </main>
</body>
</html>
