<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva cuenta</title>
</head>
<body>
    <header>
        <h1>Crea tu cuenta de alumno</h1>
        <p>Para poder acceder al curso, necesitas crear un nuevo usuario que te conceda el acceso a la plataforma.</p>
    </header>
    <main>
        <form>
            <p>
                <label for="name">Nombre de usuario</label>
                <input id="name" name="name" type="text" required placeholder="Fulanita de tal y pascual">
            </p>
            <p>
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" required placeholder="correo@email.com">
            </p>
            <p>
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required minlength="5">
            </p>
            <p>
                <label for="age">Edad</label>
                <input id="age" name="age" type="number" min="18" max="30">
            </p>
            <p>
                <label for="portfolio">Enlaza tu portfolio o un perfil profesional</label>
                <br>
                <input id="portfolio" name="portfolio" type="url">
            </p>
            <p>
                <input id="terms" name="terms" type="checkbox" required>
                <label for="terms">Acepto los términos y condiciones</label>
            </p>
            <p>
                <button type="submit">Enviar</button>
            </p>
        </form>
    </main>
</body>
</html>
