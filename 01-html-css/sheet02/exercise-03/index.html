<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <header>
        <h1>Reserva de plaza en el bootcamp</h1>
        <p>Rellena el siguiente formulario para poder optar a una plaza en el mejor bootamp de desarrollo web fullstack de Málaga.</p>
    </header>
    <main>
        <form method="GET" action="">
            <fieldset>
                <legend>Datos personales</legend>
    
                <label for="name">Nombre de usuario</label>
                <input id="name" name="name" type="text" required placeholder="Fulanita de tal y pascual"><br><br>
                
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" required placeholder="correo@example.com">
            </fieldset>
            <fieldset>
                <legend>Modalidad</legend>
                <input id="presencial" name="modalidad" type="radio" value="presencial">
                <label for="presencial">Presencial</label><br>
    
                <input id="remoto" name="modalidad" type="radio" value="remoto">
                <label for="remoto">Remoto</label><br>
    
                <input id="hibrido" name="modalidad" type="radio"value="hibrido">
                <label for="hibrido">Hibrido</label>
            </fieldset>
            <fieldset>
                <legend>Áreas de interés</legend>
                <input id="frontend" name="areas" type="checkbox" value="frontend">
                <label for="frontend">Frontend</label><br>
    
                <input id="backend" name="areas" type="checkbox" value="backend">
                <label for="backend">Backend</label><br>
    
                <input id="devops" name="areas" type="checkbox" value="devops">
                <label for="devops">DevOps</label><br>
    
                <input id="uxui" name="areas" type="checkbox" value="uxui">
                <label for="uxui">UX/UI</label><br>
    
                <input id="fullstack" name="areas" type="checkbox" value="fullstack">
                <label for="fullstack">Fullstack</label><br>
    
                <input id="inteligencia-artificial" name="areas" type="checkbox" value="inteligencia-artificial">
                <label for="inteligencia-artificial">Inteligencia Artificial</label><br>
            </fieldset>
            <fieldset>
                <legend>Motivación</legend>
                <label for="motivacion">Cuéntanos por qué quieres asistir al bootcamp:</label>
                <textarea id="motivacion" name="motivacion" rows="5" cols="50" placeholder="Escribe aquí tus comentarios" aria-describedby="motivacion-help"></textarea><br>
                <small id="motivacion-help">Tu motivación es importante para nosotros, así que no dudes en compartirla.</small>
            </fieldset><br>
            <button type="submit">Enviar</button>
        </form>
    </main>
</body>
</html>
