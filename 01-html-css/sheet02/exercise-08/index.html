<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progreso de alumno</title>
</head>
<body>
    <header>
        <h1>Progreso del alumno</h1>
    </header>
    <main>
        <section>
            <h2>Panel de progreso del alumno</h2>
            <p>Seguimiento detallado del avance en el bootcamp de desarrollo web</p>

            <h3>Progreso de aprendizaje</h3>
            <label for="modulo">Módulo de HTML y CSS</label><br>
            <progress id="modulo" value="70" max="100">70%</progress><br>

            <label for="proyecto">Proyecto final</label><br>
            <progress id="proyecto" value="40" max="100">40%</progress>

            <h3>Indicadores de rendimiento</h3>
            <label for="nivel-js">Nivel actual en JavaScript</label><br>
            <meter id="nivel-js" value="6" min="0" max="10">6 de 10</meter><br>

            <label for="carga-trabajo">Carga de trabajo semanal</label><br>
            <meter id="carga-trabajo" value="8" min="0" max="10">Alta</meter>
        </section>
    </main>
</body>
</html>
