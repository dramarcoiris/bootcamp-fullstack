<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progreso de alumno</title>
</head>
<body>
    <header>
        <h1>Progreso del alumno</h1>
    </header>
    <main>
        <section>
            <h2>Panel de progreso del alumno</h2>
            <p>Seguimiento detallado del avance en el bootcamp de desarrollo web</p>

            <h3>Progreso de aprendizaje</h3>
            <label for="modulo">Módulo de HTML y CSS</label>
            <progress id="modulo" value="90" max="100">90%</progress><br>

            <label for="proyecto">Realización del proyecto final</label>
            <progress id="proyecto" value="2" max="100">2%</progress>

            <h3>Trabajo realizado de ejercicios</h3>
            <label for="nivel-js">Espacio en disco usado para seguir haciendo ejercicios</label>
            <meter id="nivel-js" min="0" max="100" value="25">25 de 100</meter><br>

            <label for="carga-trabajo">Carga de trabajo semanal</label>
            <meter id="carga-trabajo" min="0" max="100" value="70">70 de 100</meter>
        </section>
    </main>
</body>
</html>
