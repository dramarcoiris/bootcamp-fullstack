<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <header>
        <h1>Formulario de registro</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Datos personales</legend>
                <label for="name">Nombre:</label>
                <input id="name" name="name" type="text" required placeholder="Fulanita de tal"><br><br>

                <label for="email">Correo:</label>
                <input id="email" name="email" type="email" required placeholder="correo@mail.com"><br><br>

                <label for="password">Password:</label>
                <input id="password" name="password" type="password" required><br><br>
            </fieldset>

            <fieldset>
                <legend>Información extra</legend>
                <label for="age">Edad:</label>
                <input type="number" min="18" max="80" id="age" name="age"><br><br>
                
                <label for="personal-web">Web personal:</label>
                <input type="url" id="personal-web" name="personal-web" placeholder="tupaginaweb.com">
            </fieldset><br>

            <input id="terms" name="terms" type="checkbox" required>
            <label for="terms">Acepto las condiciones</label><br><br>

            <button>Enviar</button>
        </form>
    </main>
</body>
</html>
