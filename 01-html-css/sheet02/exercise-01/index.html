<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller</title>
</head>
<body>
    <header>
        <h1>Inscripción a un taller técnico</h1>
        <p>¡No pierdas la oportunidad de poder asistir al taller anual de programación web!</p>
    </header>
    <main>
        <form>
            <p>
                <label for="name">Nombre completo</label>
                <input id="name" name="name" type="text" required placeholder="Fulanita de tal y pascual">
            </p>
            <p>
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" required placeholder="correo@email.com">
            </p>
            <p>
                <label for="phone">Teléfono</label>
                <input id="phone" name="" type="tel" required pattern="[0-9]{9}" placeholder="612 345 678">
            </p>
            <p>
                <label for="date">Fecha preferida</label>
                <input id="date" name="dat" type="date">
            </p>
            <p>
                <label for="message">Escribe tu mensaje</label>
                <br>
                <textarea id="message" name="message"></textarea>
            </p>
            <p>
                <button type="submit">Enviar</button>
            </p>
        </form>
    </main>
</body>
</html>
